<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Defense of the Ancients</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0000; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; touch-action: manipulation; }
    canvas { display: block; margin: 0 auto; border-radius: 12px; background: radial-gradient(circle at 20% 30%, #2d0000, #150000); }
    .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    .login-title { font-size: 2rem; color: #ff3030; margin-bottom: 25px; text-shadow: 0 0 20px red; }
    .login-input { background: #1a0000; border: 2px solid #8b0000; color: #ff8888; padding: 14px 22px; font-size: 1.1rem; border-radius: 14px; width: 90%; max-width: 300px; text-align: center; margin-bottom: 18px; outline: none; }
    .login-btn { background: #ff3030; border: none; color: white; font-weight: bold; font-size: 1.3rem; padding: 14px 40px; border-radius: 45px; cursor: pointer; }
    .hud { position: fixed; bottom: 10px; left: 10px; color: #ff4444; font-weight: bold; font-size: 0.9rem; z-index: 5; }
    .hint { position: fixed; bottom: 10px; right: 10px; color: #888; font-size: 0.8rem; z-index: 5; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <div class="login-screen" id="loginScreen">
    <div class="login-title">🎮 ВВЕДИТЕ НИК</div>
    <input type="text" class="login-input" id="nicknameInput" placeholder="Никнейм" maxlength="15" autocomplete="off">
    <button class="login-btn" id="loginBtn">⚡ В БИТВУ</button>
  </div>
  
  <div class="hud">❤️ <span id="hpDisplay">100</span> | 🏆 <span id="killCount">0</span> | 👥 <span id="playerCount">1</span></div>
  <div class="hint">WASD + ПРОБЕЛ</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = Math.min(window.innerWidth - 20, 1000);
  canvas.height = Math.min(window.innerHeight - 40, 600);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let playerId = null;
let playerData = { x: 500, y: 300, hp: 100, kills: 0 };
let gameState = { players: [], enemies: [] };
let gameActive = false;

// Подключение к серверу (HTTP)
async function joinGame(nickname) {
  const resp = await fetch('/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nickname: nickname })
  });
  const data = await resp.json();
  playerId = data.player.id;
  playerData = data.player;
  document.getElementById('loginScreen').style.display = 'none';
  gameActive = true;
}

// Обновление состояния с сервера
async function fetchState() {
  const resp = await fetch('/state');
  gameState = await resp.json();
}

// Отправка движения
async function sendMove(x, y) {
  await fetch('/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: playerId, x: x, y: y })
  });
}

// Отправка атаки
async function sendAttack() {
  await fetch('/attack', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: playerId })
  });
}

// Кнопка входа
document.getElementById('loginBtn').addEventListener('click', () => {
  const nick = document.getElementById('nicknameInput').value.trim() || 'Игрок';
  joinGame(nick);
});

document.getElementById('nicknameInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// Управление
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') sendAttack();
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// Игровой цикл
setInterval(async () => {
  if (!gameActive) return;
  
  // Движение
  let dx = 0, dy = 0;
  if (keys['w']) dy -= 1;
  if (keys['s']) dy += 1;
  if (keys['a']) dx -= 1;
  if (keys['d']) dx += 1;
  
  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    playerData.x += (dx / len) * 5;
    playerData.y += (dy / len) * 5;
    playerData.x = Math.max(15, Math.min(canvas.width - 15, playerData.x));
    playerData.y = Math.max(15, Math.min(canvas.height - 15, playerData.y));
    sendMove(playerData.x, playerData.y);
  }
  
  // Получение состояния
  await fetchState();
  
  // Обновление HUD
  const me = gameState.players.find(p => p.id === playerId);
  if (me) {
    document.getElementById('hpDisplay').textContent = Math.floor(me.hp);
    document.getElementById('killCount').textContent = me.kills;
  }
  document.getElementById('playerCount').textContent = gameState.players.length;
}, 50);

// Отрисовка
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Фон
  ctx.fillStyle = '#1a0000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Сетка
  ctx.strokeStyle = 'rgba(255,0,0,0.1)';
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.width; i += 50) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }
  for (let i = 0; i < canvas.height; i += 50) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
  }
  
  // Враги
  gameState.enemies.forEach(enemy => {
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, 10, 0, Math.PI * 2);
    ctx.fillStyle = enemy.hp > 0 ? '#8b0000' : '#333';
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  
  // Игроки
  gameState.players.forEach(player => {
    if (player.hp <= 0) return;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.id === playerId ? 14 : 11, 0, Math.PI * 2);
    ctx.fillStyle = player.id === playerId ? '#ff4444' : '#ccc';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = player.id === playerId ? 3 : 2;
    ctx.stroke();
    
    // Никнейм
    ctx.fillStyle = '#fff';
    ctx.font = '10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(player.nickname || '', player.x, player.y - 18);
  });
  
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
